<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>東西＋南北 右左折対応 十字路交通シミュレーション</title>
<style>
body{margin:0;background:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111827;text-align:center}
header{padding:14px 18px;border-bottom:1px solid #e5e7eb;background:#fff}h1{margin:0 0 4px;font-size:20px}p{margin:0;color:#4b5563;font-size:13px}.layout{display:grid;grid-template-columns:1fr 360px;gap:14px;padding:14px;align-items:start}canvas{background:#fff;border:2px solid #111827;box-shadow:0 2px 10px rgba(0,0,0,.12);max-width:100%}aside{text-align:left;background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:12px}fieldset{border:1px solid #d1d5db;border-radius:10px;margin:0 0 10px;padding:10px;background:#fff}legend{font-weight:700;font-size:13px;padding:0 6px}label{display:grid;grid-template-columns:1fr 86px;gap:8px;align-items:center;font-size:12px;margin:8px 0}input,button{width:100%;box-sizing:border-box}button{padding:7px;border:1px solid #cbd5e1;border-radius:8px;background:#fff;cursor:pointer;font-weight:700}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.stat{display:flex;justify-content:space-between;border-bottom:1px dashed #ddd;padding:4px 0;font-size:12px}.note{font-size:11px;line-height:1.55;color:#4b5563}</style>
</head>
<body>
<header><h1>東西＋南北 右左折対応 十字路交通シミュレーション</h1><p>南北方向にも左折・右折車を追加。まずは進路分岐と曲線走行を実装し、信号に従って交互に通行します。</p></header>
<div class="layout"><main><canvas id="cv" width="900" height="600"></canvas></main><aside>
<fieldset><legend>操作</legend><div class="row"><button id="pauseBtn">一時停止</button><button id="resetBtn">リセット</button></div><label>速度倍率 <input id="speed" type="range" min="0.5" max="5" step="0.5" value="1.5"></label><div class="row"><button onclick="manualPhase=null">自動</button><button onclick="manualPhase='EW'">東西青</button></div><div class="row"><button onclick="manualPhase='NS'">南北青</button><button onclick="manualPhase='ALLRED'">全赤</button></div></fieldset>
<fieldset><legend>交通条件：東西方向</legend><label>西側流入量 台/時 <input id="flow" type="range" min="100" max="1800" step="50" value="850"></label><span id="flowV"></span><label>西側右折率 % <input id="rightRate" type="range" min="0" max="60" step="1" value="25"></label><span id="rightRateV"></span><label>西側左折率 % <input id="leftRate" type="range" min="0" max="50" step="1" value="15"></label><span id="leftRateV"></span><label>東側対向流入量 台/時 <input id="oppFlow" type="range" min="0" max="1800" step="50" value="700"></label><span id="oppFlowV"></span></fieldset>
<fieldset><legend>交通条件：南北方向</legend><label>北→南 台/時 <input id="northFlow" type="range" min="0" max="1800" step="50" value="500"></label><span id="northFlowV"></span><label>南→北 台/時 <input id="southFlow" type="range" min="0" max="1800" step="50" value="500"></label><span id="southFlowV"></span><label>南北右折率 % <input id="nsRightRate" type="range" min="0" max="60" step="1" value="20"></label><span id="nsRightRateV"></span><label>南北左折率 % <input id="nsLeftRate" type="range" min="0" max="50" step="1" value="15"></label><span id="nsLeftRateV"></span><label>大型車率 % <input id="truckRate" type="range" min="0" max="50" step="1" value="10"></label><span id="truckRateV"></span></fieldset>
<fieldset><legend>集計</legend><div id="stats"></div></fieldset>
<p class="note"><b style="color:#2563eb">青</b>=西側直進、<b style="color:#16a34a">緑</b>=左折、<b style="color:#f97316">橙</b>=右折、<b style="color:#6b7280">灰</b>=東側対向、<b style="color:#7c3aed">紫</b>=南北直進、<b style="color:#0ea5e9">水色</b>=南北左折、<b style="color:#ec4899">桃</b>=南北右折。<br>今回の追加では、南北の右左折は進路分岐・描画・進路別追従まで実装。南北右折の対向ギャップ判定は次段階で追加できます。</p>
</aside></div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height,FPS=60,DT=1/FPS;const $=id=>document.getElementById(id),val=id=>+$(id).value;
const X_STOP=370,MAIN_Y=285,OPP_Y=305,OPP_X_STOP=490,OPP_SPAWN_X=W+70;const N2S_X=470,S2N_X=430,N_STOP_Y=245,S_STOP_Y=345,N_SPAWN_Y=-70,S_SPAWN_Y=H+70;
const R_RIGHT=60,X_RIGHT_START=410,CX_RIGHT=X_RIGHT_START,CY_RIGHT=MAIN_Y+R_RIGHT,ARC_RIGHT=R_RIGHT*Math.PI/2,X_RIGHT_EXIT=CX_RIGHT+R_RIGHT;const R_LEFT=50,X_LEFT_EXIT=430,X_LEFT_START=X_LEFT_EXIT-R_LEFT,CX_LEFT=X_LEFT_START,CY_LEFT=MAIN_Y-R_LEFT,ARC_LEFT=R_LEFT*Math.PI/2;
const R_NS=30;const N_START_LEFT=325,N_START_RIGHT=345,S_START_LEFT=335,S_START_RIGHT=355;const ARC_NS=R_NS*Math.PI/2;
let t=0,cars=[],idSeq=1,paused=false,manualPhase=null,nextWest=0,nextEast=0,nextNorth=0,nextSouth=0,stats=makeStats();
function makeStats(){return{generated:0,passed:0,passedS:0,passedL:0,passedR:0,generatedNS:0,passedNS:0,passedNS_S:0,passedNS_L:0,passedNS_R:0,maxQueueEW:0,maxQueueNS:0,travelTimes:[],stopCounts:[]};}
function kmh(v){return(v/3.6)/4}function avg(a){return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}function randExp(r){if(r<=0)return Infinity;return-Math.log(1-Math.random())/(r/3600)}function vehicleParam(truck){return truck?{len:44,width:20,vMax:kmh(38),acc:.010}:{len:30,width:18,vMax:kmh(50),acc:.018}}
function decideTurnEW(){const l=val('leftRate')/100,r=val('rightRate')/100,u=Math.random();return u<l?'left':u<l+r?'right':'straight'}function decideTurnNS(){const l=val('nsLeftRate')/100,r=val('nsRightRate')/100,u=Math.random();return u<l?'left':u<l+r?'right':'straight'}
class Car{constructor(route){this.id=idSeq++;this.route=route;this.dir=route==='west'?decideTurnEW():(route==='north'||route==='south'?decideTurnNS():'straight');this.isTruck=Math.random()<val('truckRate')/100;this.p=vehicleParam(this.isTruck);this.v=this.p.vMax*.75;this.s=route==='west'?-70:0;this.spawnTime=t;this.stopCount=0;this.wasStopped=false;this.committed=false;this.ignoreSignal=false;this.signalCleared=false}}
function reset(){t=0;cars=[];idSeq=1;stats=makeStats();nextWest=randExp(val('flow'));nextEast=randExp(val('oppFlow'));nextNorth=randExp(val('northFlow'));nextSouth=randExp(val('southFlow'))}
function phase(){if(manualPhase)return manualPhase;const c=t%90;if(c<50)return'EW';if(c<55)return'EW_Y';if(c<60)return'ALLRED';if(c<85)return'NS';return'NS_Y'}function signalFor(route){const p=phase();if(route==='west'||route==='east')return p==='EW'?'green':p==='EW_Y'?'yellow':'red';return p==='NS'?'green':p==='NS_Y'?'yellow':'red'}
function nsTurnStart(c){if(c.route==='north')return c.dir==='left'?N_START_LEFT:N_START_RIGHT;if(c.route==='south')return c.dir==='left'?S_START_LEFT:S_START_RIGHT;return Infinity}
function screenPos(c){const s=c.s;if(c.route==='east')return{x:OPP_SPAWN_X-s,y:OPP_Y,angle:Math.PI};
 if(c.route==='north'){if(c.dir==='straight'||s<nsTurnStart(c))return{x:N2S_X,y:N_SPAWN_Y+s,angle:Math.PI/2};const st=nsTurnStart(c),ds=s-st;if(c.dir==='left'){if(ds<=ARC_NS){const cx=N2S_X+R_NS,cy=N_SPAWN_Y+st,th=Math.PI-ds/R_NS;return{x:cx+R_NS*Math.cos(th),y:cy+R_NS*Math.sin(th),angle:Math.PI/2-ds/R_NS}}return{x:N2S_X+R_NS+(ds-ARC_NS),y:N_SPAWN_Y+st+R_NS,angle:0}}if(ds<=ARC_NS){const cx=N2S_X-R_NS,cy=N_SPAWN_Y+st,th=ds/R_NS;return{x:cx+R_NS*Math.cos(th),y:cy+R_NS*Math.sin(th),angle:Math.PI/2+ds/R_NS}}return{x:N2S_X-R_NS-(ds-ARC_NS),y:N_SPAWN_Y+st+R_NS,angle:Math.PI}}
 if(c.route==='south'){if(c.dir==='straight'||s<nsTurnStart(c))return{x:S2N_X,y:S_SPAWN_Y-s,angle:-Math.PI/2};const st=nsTurnStart(c),ds=s-st;if(c.dir==='left'){if(ds<=ARC_NS){const cx=S2N_X-R_NS,cy=S_SPAWN_Y-st,th=-ds/R_NS;return{x:cx+R_NS*Math.cos(th),y:cy+R_NS*Math.sin(th),angle:-Math.PI/2-ds/R_NS}}return{x:S2N_X-R_NS-(ds-ARC_NS),y:S_SPAWN_Y-st-R_NS,angle:Math.PI}}if(ds<=ARC_NS){const cx=S2N_X+R_NS,cy=S_SPAWN_Y-st,th=Math.PI+ds/R_NS;return{x:cx+R_NS*Math.cos(th),y:cy+R_NS*Math.sin(th),angle:-Math.PI/2+ds/R_NS}}return{x:S2N_X+R_NS+(ds-ARC_NS),y:S_SPAWN_Y-st-R_NS,angle:0}}
 if(c.dir==='right'){if(s<X_RIGHT_START)return{x:s,y:MAIN_Y,angle:0};const ds=s-X_RIGHT_START;if(ds<=ARC_RIGHT){const th=-Math.PI/2+ds/R_RIGHT;return{x:CX_RIGHT+R_RIGHT*Math.cos(th),y:CY_RIGHT+R_RIGHT*Math.sin(th),angle:th+Math.PI/2}}return{x:X_RIGHT_EXIT,y:CY_RIGHT+(ds-ARC_RIGHT),angle:Math.PI/2}}
 if(c.dir==='left'){if(s<X_LEFT_START)return{x:s,y:MAIN_Y,angle:0};const ds=s-X_LEFT_START;if(ds<=ARC_LEFT){const th=Math.PI/2-ds/R_LEFT;return{x:CX_LEFT+R_LEFT*Math.cos(th),y:CY_LEFT+R_LEFT*Math.sin(th),angle:th-Math.PI/2}}return{x:X_LEFT_EXIT,y:CY_LEFT-(ds-ARC_LEFT),angle:-Math.PI/2}}return{x:s,y:MAIN_Y,angle:0}}
function stopLineS(c){if(c.route==='west')return X_STOP;if(c.route==='east')return OPP_SPAWN_X-OPP_X_STOP;if(c.route==='north')return N_STOP_Y-N_SPAWN_Y;if(c.route==='south')return S_SPAWN_Y-S_STOP_Y}
function isAfterTurn(c){if(c.route==='west')return(c.dir==='left'&&c.s>X_LEFT_START+ARC_LEFT)||(c.dir==='right'&&c.s>X_RIGHT_START+ARC_RIGHT);if((c.route==='north'||c.route==='south')&&c.dir!=='straight')return c.s>nsTurnStart(c)+ARC_NS;return false}
function sameLeaderRoute(a,b){if(a.id===b.id||a.route!==b.route)return false;const stop=stopLineS(a);const ab=!a.signalCleared&&a.s<stop,bb=!b.signalCleared&&b.s<stop;if(ab&&bb)return true;if(a.dir!==b.dir)return false;if(isAfterTurn(a))return isAfterTurn(b);return true}
function checkOncomingGap(car){let nearest=null,dist=Infinity;for(const o of cars){if(o.route!=='east')continue;const d=(OPP_SPAWN_X-o.s)-X_RIGHT_START;if(d>-20&&d<dist){dist=d;nearest=o}}if(!nearest)return null;const v=nearest.v,VF=kmh(50)*.66,VM=kmh(50)*.30,req=v>=VF?230:v>=VM?140:70;return dist<req?0:null}
function findTarget(c){let targetS=Infinity,targetV=c.p.vMax,targetLen=0;for(const o of cars){if(!sameLeaderRoute(c,o))continue;if(o.s>c.s&&o.s<targetS){targetS=o.s;targetV=o.v;targetLen=o.p.len}}const sig=signalFor(c.route),stop=stopLineS(c);if(!c.signalCleared){let clear=c.s>stop+12;if(c.route==='west'&&((c.dir==='left'&&c.s>=X_LEFT_START)||(c.dir==='right'&&c.s>=X_RIGHT_START)))clear=true;if((c.route==='north'||c.route==='south')&&c.dir!=='straight'&&c.s>=nsTurnStart(c))clear=true;if(clear){c.signalCleared=true;c.committed=false;c.ignoreSignal=false}}if(!c.signalCleared&&sig==='green'){c.committed=false;c.ignoreSignal=false}if(!c.signalCleared&&(sig==='red'||sig==='yellow')){const stopTarget=stop-8;if(c.committed){if(!c.ignoreSignal&&stopTarget<targetS){targetS=stopTarget;targetV=0;targetLen=0}}else if(c.s+c.p.len<=stop){const dist=stopTarget-c.s,brake=(c.v*c.v)/(2*c.p.acc);if(dist>0&&stopTarget<targetS){if(dist>=brake*1.1||c.v<.01){c.ignoreSignal=false;c.committed=true;targetS=stopTarget;targetV=0;targetLen=0}else{c.ignoreSignal=true;c.committed=true}}}}
 if(c.route==='west'&&c.dir==='left'&&c.s>X_LEFT_START-50&&c.s<=X_LEFT_START+ARC_LEFT)targetV=Math.min(targetV,kmh(16));if(c.route==='west'&&c.dir==='right'&&c.s>X_RIGHT_START-40&&c.s<=X_RIGHT_START+ARC_RIGHT)targetV=Math.min(targetV,kmh(12));if((c.route==='north'||c.route==='south')&&c.dir!=='straight'&&c.s>nsTurnStart(c)-35&&c.s<=nsTurnStart(c)+ARC_NS)targetV=Math.min(targetV,kmh(c.dir==='left'?16:12));if(isAfterTurn(c))targetV=Math.max(targetV,c.v,kmh(c.dir==='left'?18:16));if(c.route==='west'&&c.dir==='right'&&c.s<X_RIGHT_START){const block=checkOncomingGap(c);if(block!==null){targetV=Math.min(targetV,block);if(X_RIGHT_START<targetS){targetS=X_RIGHT_START;targetLen=0}}}return{targetS,targetV,targetLen}}
function moveCar(c){const r=findTarget(c),gap=Math.max(2,r.targetS-c.s-r.targetLen-8),desired=10+c.v*65+Math.max(0,c.v-r.targetV)*75;let a=c.p.acc*(1-Math.pow(c.v/c.p.vMax,4)-Math.pow(desired/gap,2));c.v=Math.max(0,Math.min(c.p.vMax,c.v+a));if(c.v<.004)c.v=0;if(c.v<.05&&!c.wasStopped){c.stopCount++;c.wasStopped=true}if(c.v>=.08)c.wasStopped=false;c.s+=c.v}
function spawn(){if(t>=nextWest){if(!cars.some(c=>c.route==='west'&&c.s<45)){cars.push(new Car('west'));stats.generated++}nextWest=t+randExp(val('flow'))}if(t>=nextEast){if(!cars.some(c=>c.route==='east'&&c.s<45))cars.push(new Car('east'));nextEast=t+randExp(val('oppFlow'))}if(t>=nextNorth){if(!cars.some(c=>c.route==='north'&&c.s<45)){cars.push(new Car('north'));stats.generatedNS++}nextNorth=t+randExp(val('northFlow'))}if(t>=nextSouth){if(!cars.some(c=>c.route==='south'&&c.s<45)){cars.push(new Car('south'));stats.generatedNS++}nextSouth=t+randExp(val('southFlow'))}}
function exited(c){if(c.route==='west'){if(c.dir==='straight')return c.s>W+80;if(c.dir==='left')return c.s>X_LEFT_START+ARC_LEFT+220;if(c.dir==='right')return c.s>X_RIGHT_START+ARC_RIGHT+220}if(c.route==='east')return c.s>OPP_SPAWN_X+90;if(c.route==='north'||c.route==='south'){if(c.dir==='straight')return c.s>H+160;return c.s>nsTurnStart(c)+ARC_NS+520}return false}
function removeExited(){cars=cars.filter(c=>{if(!exited(c))return true;if(c.route==='west'){stats.passed++;stats.travelTimes.push(t-c.spawnTime);stats.stopCounts.push(c.stopCount);if(c.dir==='straight')stats.passedS++;if(c.dir==='left')stats.passedL++;if(c.dir==='right')stats.passedR++}if(c.route==='north'||c.route==='south'){stats.passedNS++;if(c.dir==='straight')stats.passedNS_S++;if(c.dir==='left')stats.passedNS_L++;if(c.dir==='right')stats.passedNS_R++}return false})}
function qEW(){return cars.filter(c=>c.route==='west'&&c.s<X_STOP&&c.v<.05).length}function qNS(){return cars.filter(c=>(c.route==='north'||c.route==='south')&&!c.signalCleared&&c.v<.05).length}
function step(){const repeat=Math.max(1,Math.round(val('speed')));for(let i=0;i<repeat;i++){spawn();for(const c of cars)moveCar(c);removeExited();stats.maxQueueEW=Math.max(stats.maxQueueEW,qEW());stats.maxQueueNS=Math.max(stats.maxQueueNS,qNS());t+=DT}}
function drawRoad(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.fillStyle='#d8d8d8';ctx.fillRect(0,255,W,80);ctx.fillRect(410,0,80,H);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([16,14]);ctx.beginPath();ctx.moveTo(0,295);ctx.lineTo(410,295);ctx.moveTo(490,295);ctx.lineTo(W,295);ctx.moveTo(450,0);ctx.lineTo(450,255);ctx.moveTo(450,335);ctx.lineTo(450,H);ctx.stroke();ctx.setLineDash([]);ctx.strokeStyle='#111827';ctx.lineWidth=2;ctx.strokeRect(0,255,W,80);ctx.strokeRect(410,0,80,H);ctx.fillStyle='#fff';ctx.fillRect(X_STOP,255,5,40);ctx.fillRect(OPP_X_STOP-5,295,5,40);ctx.fillRect(410,N_STOP_Y,80,5);ctx.fillRect(410,S_STOP_Y-5,80,5);ctx.fillStyle='#111827';ctx.font='13px sans-serif';ctx.fillText('西側流入',70,270);ctx.fillText('東側対向',610,320);ctx.fillText('北→南',500,120);ctx.fillText('南→北',345,500)}
function drawSignals(){const ew=signalFor('west'),ns=signalFor('north');const col=s=>s==='green'?'#22c55e':s==='yellow'?'#eab308':'#ef4444';ctx.fillStyle='#111827';ctx.fillRect(340,205,26,62);ctx.fillRect(500,350,26,62);ctx.fillStyle=col(ew);ctx.beginPath();ctx.arc(353,236,10,0,Math.PI*2);ctx.fill();ctx.fillStyle=col(ns);ctx.beginPath();ctx.arc(513,381,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111827';ctx.font='13px sans-serif';ctx.fillText('東西: '+(ew==='green'?'青':ew==='yellow'?'黄':'赤'),20,28);ctx.fillText('南北: '+(ns==='green'?'青':ns==='yellow'?'黄':'赤'),100,28)}
function drawCar(c){const p=screenPos(c);ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);if(c.ignoreSignal)ctx.fillStyle='#dc2626';else if(c.committed)ctx.fillStyle='#ca8a04';else if(c.route==='east')ctx.fillStyle='#6b7280';else if(c.route==='north'||c.route==='south')ctx.fillStyle=c.dir==='left'?'#0ea5e9':c.dir==='right'?'#ec4899':(c.isTruck?'#8b5cf6':'#7c3aed');else if(c.isTruck)ctx.fillStyle='#8b5cf6';else if(c.dir==='straight')ctx.fillStyle='#2563eb';else if(c.dir==='left')ctx.fillStyle='#16a34a';else ctx.fillStyle='#f97316';ctx.fillRect(-c.p.len/2,-c.p.width/2,c.p.len,c.p.width);ctx.fillStyle='#111827';ctx.fillRect(c.p.len/2-5,-c.p.width/2,4,c.p.width);ctx.restore()}
function drawHUD(){ctx.fillStyle='rgba(255,255,255,.92)';ctx.fillRect(12,38,288,88);ctx.strokeStyle='#e5e7eb';ctx.strokeRect(12,38,288,88);ctx.fillStyle='#111827';ctx.font='13px sans-serif';ctx.fillText(`時刻 ${t.toFixed(1)} 秒`,24,60);ctx.fillText(`東西停止キュー ${qEW()} 台`,24,82);ctx.fillText(`南北停止キュー ${qNS()} 台`,24,104)}function draw(){drawRoad();drawSignals();for(const c of cars)drawCar(c);drawHUD()}
function updateStats(){for(const id of ['flow','rightRate','leftRate','oppFlow','northFlow','southFlow','nsRightRate','nsLeftRate','truckRate'])$(id+'V').textContent=val(id)+(id.includes('Rate')?' %':' 台/時');$('stats').innerHTML=`<div class="stat"><span>西側発生/通過</span><b>${stats.generated}/${stats.passed}</b></div><div class="stat"><span>西側 直/左/右</span><b>${stats.passedS}/${stats.passedL}/${stats.passedR}</b></div><div class="stat"><span>南北発生/通過</span><b>${stats.generatedNS}/${stats.passedNS}</b></div><div class="stat"><span>南北 直/左/右</span><b>${stats.passedNS_S}/${stats.passedNS_L}/${stats.passedNS_R}</b></div><div class="stat"><span>最大停止キュー 東西</span><b>${stats.maxQueueEW}</b></div><div class="stat"><span>最大停止キュー 南北</span><b>${stats.maxQueueNS}</b></div><div class="stat"><span>平均通過時間 西側</span><b>${avg(stats.travelTimes).toFixed(1)} 秒</b></div><div class="stat"><span>平均停止回数 西側</span><b>${avg(stats.stopCounts).toFixed(2)}</b></div>`}
function loop(){if(!paused)step();draw();updateStats();requestAnimationFrame(loop)}$('pauseBtn').onclick=()=>{paused=!paused;$('pauseBtn').textContent=paused?'再開':'一時停止'};$('resetBtn').onclick=reset;reset();loop();
</script></body></html>
